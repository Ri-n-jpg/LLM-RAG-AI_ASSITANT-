<style>
.sidebar {
    width: 260px;
    height: 100vh;
    background: #171717;
    border-right: 1px solid #333;
    padding: 15px;
    color: white;
    overflow-y: auto;
}

.new-chat-btn {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    background: #10a37f;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    font-size: 14px;
}

.new-chat-btn:hover {
    background: #0e8c6d;
}

#chatList {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.chat-item {
    padding: 10px;
    border-radius: 6px;
    background: #202123;
    cursor: pointer;
    font-size: 14px;
    border: 1px solid #2c2c2c;
    transition: 0.2s;
}

.chat-item:hover {
    background: #2c2c2c;
}
</style>

<div class="sidebar">

    <!-- NEW CHAT -->
    <button class="new-chat-btn" onclick="newChat()">
        + New Chat
    </button>

    <!-- SESSION LIST -->
    <div id="chatSessions"></div>

</div>

<script>
/* =========================
   LOAD ALL SESSIONS
========================= */
async function loadSessions() {
    try {
        let response = await fetch("/api/sessions/");
        let data = await response.json();

        console.log(data);

        let container = document.getElementById("chatSessions");
        container.innerHTML = "";

        data.sessions.forEach(session => {
            addSession(
                session.title,
                session.session_id
            );
        });

    } catch (err) {
        console.log("Error loading sessions:", err);
    }
}

/* =========================
   ADD SESSION TO SIDEBAR
========================= */
function addSession(title, sessionId) {
    let chatList = document.getElementById("chatSessions");

    let wrapper = document.createElement("div");
    wrapper.style.display = "flex";
    wrapper.style.justifyContent = "space-between";
    wrapper.style.alignItems = "center";
    wrapper.style.padding = "10px";
    wrapper.style.marginBottom = "8px";
    wrapper.style.background = "#2d2d2d";
    wrapper.style.borderRadius = "8px";

    let titleDiv = document.createElement("div");
    titleDiv.innerText = title;
    titleDiv.style.cursor = "pointer";

    titleDiv.onclick = function () {
        openSession(sessionId);
    };

    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "🗑";

    deleteBtn.onclick = function (e) {
        e.stopPropagation();
        deleteSession(sessionId);
    };

    wrapper.appendChild(titleDiv);
    wrapper.appendChild(deleteBtn);

    chatList.appendChild(wrapper);
}

/* =========================
   NEW CHAT
========================= */
function newChat() {
    localStorage.removeItem("session_id");

    if (typeof sessionId !== "undefined") {
        sessionId = null;
    }

    document.getElementById("chatBox").innerHTML = "";
}

/* =========================
   OPEN OLD CHAT
========================= */
async function openSession(id) {
    try {
        let response = await fetch(`/api/messages/${id}/`);
        let data = await response.json();

        console.log(data);

        let chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";

        data.messages.forEach(msg => {
            addMessage(
                msg.role === "user" ? "You" : "AI",
                msg.message,
                msg.role === "user" ? "user" : "ai"
            );
        });

        localStorage.setItem("session_id", id);

    } catch (err) {
        console.log("Error loading messages:", err);
    }
}

/* =========================
   DELETE SESSION
========================= */
async function deleteSession(sessionId) {
    try {
        let response = await fetch(
            `/api/delete-session/${sessionId}/`,
            {
                method: "DELETE"
            }
        );

        let data = await response.json();
        alert(data.message);

        loadSessions();

    } catch (err) {
        console.log("Delete error:", err);
    }
}

/* =========================
   AUTO LOAD ON PAGE START
========================= */
window.onload = function () {
    loadSessions();
};
</script>
