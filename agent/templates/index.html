<!DOCTYPE html>
<html>
<head>
    <title>AI RAG Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        /* HEADER */
        .header {
            padding: 15px;
            text-align: center;
            background: #111827;
            font-size: 20px;
            font-weight: bold;
        }

        /* CONTAINER */
        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        /* BOX */
        .box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* CHAT BOX */
        #chatBox {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: #0b1220;
            border-radius: 10px;
        }

        /* MESSAGES */
        .msg {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            line-height: 1.4;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
            text-align: right;
        }

        .ai {
            background: #374151;
            margin-right: auto;
        }

        /* INPUT AREA */
        .inputBox {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #16a34a;
        }

        /* UPLOAD */
        input[type="file"] {
            margin-right: 10px;
        }
    </style>
</head>

<body>

<div class="header">📄 AI RAG CHATBOT</div>

<div class="container">

    <!-- UPLOAD -->
    <div class="box">
        <h3>Upload PDF</h3>
        <input type="file" id="pdfFile">
        <button onclick="uploadPDF()">Upload</button>
    </div>

    <!-- CHAT -->
    <div class="box">
        <h3>Chat with PDF</h3>

        <div id="chatBox"></div>

        <div class="inputBox">
            <input type="text" id="message" placeholder="Ask something...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script>

const API_BASE = "http://127.0.0.1:8000/api";

// -------------------
// ADD MESSAGE
// -------------------
function addMessage(text, type) {
    let chatBox = document.getElementById("chatBox");

    let div = document.createElement("div");
    div.classList.add("msg", type);

    div.innerText = text;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// -------------------
// SEND MESSAGE
// -------------------
async function sendMessage() {
    let input = document.getElementById("message");
    let msg = input.value;

    if (!msg) return;

    addMessage("You: " + msg, "user");
    input.value = "";

    let res = await fetch("http://127.0.0.1:8000/api/chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: msg })
    });

    let data = await res.json();

    console.log("API RESPONSE:", data);

    if (data.response) {
        addMessage("AI: " + data.response, "ai");
    } else {
        addMessage("AI Error: " + (data.error || "Unknown error"), "ai");
    }
}

// -------------------
// UPLOAD PDF
// -------------------
async function uploadPDF() {
    let file = document.getElementById("pdfFile").files[0];

    if (!file) {
        alert("Select a PDF first");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(`${API_BASE}/upload_pdf/`, {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    alert(data.message || "Uploaded");
}

</script>

</body>
</html>
