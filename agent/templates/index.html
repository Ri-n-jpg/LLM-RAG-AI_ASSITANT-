<!DOCTYPE html>
<html>
<head>
    <title>AI RAG Chatbot</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            display:flex;
            height:100vh;
            background:#202123;
            color:white;
        }

        /* Sidebar */
        .sidebar{
            width:260px;
            background:#171717;
            padding:20px;
            border-right:1px solid #333;
            overflow-y:auto;
        }

        .sidebar h2{
            margin-bottom:20px;
        }

        .new-chat-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#10a37f;
            color:white;
            cursor:pointer;
            margin-bottom:20px;
        }

        .session-item{
            background:#2a2b32;
            padding:12px;
            margin-bottom:10px;
            border-radius:8px;
            cursor:pointer;
        }

        .session-item:hover{
            background:#343541;
        }

        /* Main Chat Area */
        .main{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        .header{
            padding:20px;
            border-bottom:1px solid #333;
            font-size:22px;
            font-weight:bold;
        }

        .upload-box{
            display:flex;
            gap:10px;
            padding:20px;
        }

        .upload-box input,
        .upload-box button{
            padding:10px;
            border:none;
            border-radius:8px;
        }

        .upload-box button{
            background:#10a37f;
            color:white;
            cursor:pointer;
        }

        .chat-box{
            flex:1;
            overflow-y:auto;
            padding:20px;
        }

        .message{
            max-width:75%;
            padding:12px;
            margin-bottom:15px;
            border-radius:12px;
            line-height:1.5;
        }

        .user{
            background:#10a37f;
            margin-left:auto;
        }

        .ai{
            background:#343541;
        }

        .input-area{
            display:flex;
            gap:10px;
            padding:20px;
            border-top:1px solid #333;
        }

        .input-area input{
            flex:1;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#40414f;
            color:white;
        }

        .input-area button{
            padding:15px 25px;
            border:none;
            border-radius:10px;
            background:#10a37f;
            color:white;
            cursor:pointer;
        }
    </style>
</head>
<body>
    {% include "sidebar.html" %}

    <div class="main">

        <div class="header">
            AI RAG Chatbot
        </div>

        <div class="upload-box">
            <input type="file" id="pdfFile">
            <button onclick="uploadPDF()">Upload PDF</button>
            <div id="uploadStatus"></div>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <input
                type="text"
                id="message"
                placeholder="Message AI..."
                onkeypress="if(event.key==='Enter') sendMessage()"
            >

            <button onclick="sendMessage()">
                Send
            </button>
        </div>

    </div>

<script>
let currentDocId = localStorage.getItem("doc_id");
let sessionId = localStorage.getItem("session_id");

// =========================
// Upload PDF
// =========================
async function uploadPDF() {
    let file = document.getElementById("pdfFile").files[0];

    if (!file) {
        alert("Select PDF first");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let response = await fetch("/api/upload_pdf/", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    if (data.doc_id) {
        currentDocId = data.doc_id;
localStorage.setItem("doc_id", currentDocId);
        document.getElementById("uploadStatus").innerHTML =
            "✅ PDF Uploaded";
    } else {
        document.getElementById("uploadStatus").innerHTML =
            data.error;
    }
}

// =========================
// Send Message
// =========================
async function sendMessage() {
    let input = document.getElementById("message");
    let message = input.value.trim();

    if (!message) return;

    addMessage("You", message, "user");
    input.value = "";

    let response = await fetch("/api/chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message,
            doc_id: currentDocId,
            session_id: sessionId
        })
    });

    let data = await response.json();

    if (data.source) {
        addMessage(
            "Source",
            `Document: ${data.source.document}<br>
             Chunk: ${data.source.chunk_id}<br>
             Score: ${data.source.score}`,
            "ai"
        );
    }

    if (data.session_id && !sessionId) {
        sessionId = data.session_id;
        localStorage.setItem("session_id", sessionId);

        addSession(message, sessionId);
    }

    addMessage(
        "AI",
        data.response || data.error,
        "ai"
    );
}

// =========================
// Add Message to Chat UI
// =========================
function addMessage(sender, text, cls) {
    let chatBox = document.getElementById("chatBox");

    let div = document.createElement("div");
    div.className = `message ${cls}`;
    div.innerHTML = `<b>${sender}:</b><br>${text}`;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}


async function checkLogin() {
    let res = await fetch("/api/check-auth/");
    let data = await res.json();

    if (!data.authenticated) {
        window.location.href = "/api/login-page/";
    }
}

checkLogin();

</script>
